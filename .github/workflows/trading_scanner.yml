name: Stock Scanner

on:
  schedule:
    # Scheduled with ~2h lag buffer to stay within market hours (9:30 AM–4 PM ET)
    # 14:00 UTC = 10:00 AM EDT / 9:00 AM EST  → fires by 12:00 PM EDT worst case
    # 17:00 UTC =  1:00 PM EDT / 12:00 PM EST → fires by  3:00 PM EDT worst case
    - cron: '0 14 * * 1-5'  # morning scan, Mon-Fri
    - cron: '0 17 * * 1-5'  # afternoon scan, Mon-Fri

  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install poetry
          poetry install

      - name: Run paper trade validator
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: poetry run python paper_trade_validator.py --confidence 0.45 --sell-confidence 0.3

      - name: Commit trade logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add paper_trade_log/
          git diff --staged --quiet || git commit -m "Update trade logs [skip ci]"
          git push